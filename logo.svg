<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0060FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0040CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D0D0D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A8A8A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="2" dy="2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="100" cy="90" r="75" fill="url(#blueGrad)" opacity="0.15"/>

  <!-- Outer metallic ring -->
  <ellipse cx="100" cy="90" rx="70" ry="70" fill="none" stroke="url(#outerRing)" stroke-width="8"/>

  <!-- Inner blue circle -->
  <circle cx="100" cy="90" r="62" fill="url(#blueGrad)"/>

  <!-- VF Letters -->
  <g transform="translate(100, 88)" filter="url(#glow)">
    <!-- V letter -->
    <path d="M-45,-30 L-35,-30 L-15,25 L-25,25 L-45,-30 Z" fill="white" opacity="0.95"/>
    <path d="M-25,-30 L-15,-30 L-5,25 L-15,25 L-25,-30 Z" fill="white" opacity="0.85"/>

    <!-- F letter -->
    <path d="M5,-30 L40,-30 L40,-20 L18,-20 L18,-8 L35,-8 L35,2 L18,2 L18,25 L5,25 Z" fill="white" opacity="0.95"/>
  </g>

  <!-- Decorative swirl -->
  <ellipse cx="100" cy="90" rx="78" ry="45" fill="none" stroke="url(#silverGrad)" stroke-width="3" transform="rotate(-20, 100, 90)" opacity="0.6"/>
  <ellipse cx="100" cy="90" rx="82" ry="48" fill="none" stroke="url(#silverGrad)" stroke-width="2" transform="rotate(20, 100, 90)" opacity="0.4"/>

  <!-- Text: VENDFUSION -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" letter-spacing="2">
    <tspan fill="#A0A0A0">VEND</tspan><tspan fill="#0060FF">FUSION</tspan>
  </text>
</svg>